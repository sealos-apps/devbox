name: Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: v1-controller
            image_name: devbox-v1-controller
            workdir: v1/controller
            dockerfile: v1/controller/Dockerfile
            context: v1/controller
            platforms: linux/amd64,linux/arm64
          - name: v2-controller
            image_name: devbox-v2-controller
            workdir: v2/controller
            dockerfile: v2/controller/Dockerfile
            context: v2/controller
            platforms: linux/amd64,linux/arm64
          - name: v1-frontend
            image_name: devbox-v1-frontend
            workdir: v1/frontend
            dockerfile: v1/frontend/Dockerfile
            context: v1/frontend
            platforms: linux/amd64,linux/arm64
          - name: v2-frontend
            image_name: devbox-v2-frontend
            workdir: v2/frontend
            dockerfile: v2/frontend/Dockerfile
            context: v2/frontend
            platforms: linux/amd64,linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' || github.ref_name == 'main' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          build-args: |
            NEXT_PUBLIC_MOCK_USER=
