name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.25.3"

jobs:
  controller-manifests:
    name: Controller Manifest / ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: v1
            workdir: v1/controller
            image: ghcr.io/${{ github.repository_owner }}/devbox-v1-controller:${{ github.ref_name }}
          - target: v2
            workdir: v2/controller
            image: ghcr.io/${{ github.repository_owner }}/devbox-v2-controller:${{ github.ref_name }}
    defaults:
      run:
        working-directory: ${{ matrix.workdir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.workdir }}/go.sum

      - name: Generate controller manifest
        run: make pre-deploy IMG=${{ matrix.image }}

      - name: Rename manifest artifact
        run: cp deploy/manifests/deploy.yaml dist-${{ matrix.target }}-controller-install.yaml

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-controller-install
          path: ${{ matrix.workdir }}/dist-${{ matrix.target }}-controller-install.yaml

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - controller-manifests
    steps:
      - name: Download manifest artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/v1-controller-install/dist-v1-controller-install.yaml
            artifacts/v2-controller-install/dist-v2-controller-install.yaml
          body: |
            Container images published for `${{ github.ref_name }}`:

            - `ghcr.io/${{ github.repository_owner }}/devbox-v1-controller:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/devbox-v1-frontend:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/devbox-v2-controller:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/devbox-v2-frontend:${{ github.ref_name }}`
